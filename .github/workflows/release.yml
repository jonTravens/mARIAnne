name: Release

on:
  push:
    tags:
      - 'v*.*.*' # Déclenché sur les tags semver : v1.0.0, v2.3.1, etc.

jobs:
  release:
    name: Publish & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write # Pour créer la GitHub Release
      id-token: write # Pour npm provenance (sécurité supply chain)

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Build
        run: npm run build

      - name: Test (gate de sécurité avant publication)
        run: npm run test

      # Publier le package npm avec provenance pour la traçabilité
      - name: Publish to npm
        run: npm publish --workspace packages/core --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Créer la GitHub Release avec le contenu du tag
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      # Déployer la doc (adapter selon ton hébergeur)
      # Exemple avec Vercel CLI :
      # - name: Deploy docs to Vercel
      #   run: npx vercel deploy apps/docs --prod --token=${{ secrets.VERCEL_TOKEN }}
